<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimonnAE — Bientôt</title>
  <link rel="icon" href="assets/logo-pink.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    img {
      width: clamp(280px, 55vw, 800px);
      height: auto;
      display: block;
    }
    p {
      margin-top: 24px;
      color: #efefef;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(13px, 1.2vw, 16px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <img src="assets/name-pink.svg" alt="SIMONN.AE" />
  <p>Site en maintenance</p>
</body>
</html>
