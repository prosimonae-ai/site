<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projet — SimonnAE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="project.css">
</head>
<body>

  <div id="video-cursor" class="tag"><span class="vc-text">Play</span></div>

  <a href="index.html" id="site-logo">NN</a>

  <nav id="nav" class="scrolled">
    <div class="nav-links">
      <a href="index.html"         class="nav-link">Accueil</a>
      <a href="work.html"          class="nav-link active">Projets</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
  </nav>

  <div id="proj-page">
  <!-- VIDEO PLAYER -->
  <section id="proj-reel">
    <div class="reel-outer">
      <div class="reel-video-box">
        <iframe id="vimeo" src="" frameborder="0"
          allow="autoplay; fullscreen; picture-in-picture; muted" allowfullscreen></iframe>
        <div class="reel-hit" id="reelHit"></div>

        <div class="reel-corner-btns">
          <button class="corner-btn" id="cornerMuteBtn" aria-label="Son">
            <svg class="ri ri-unmuted" viewBox="0 0 16 16">
              <path d="M2 5.5v5h3l4 3v-11l-4 3z" fill="currentColor"/>
              <path d="M11 6a2.5 2.5 0 0 1 0 4M13.5 4.5a5 5 0 0 1 0 7" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            </svg>
            <svg class="ri ri-muted" viewBox="0 0 16 16">
              <path d="M2 5.5v5h3l4 3v-11l-4 3z" fill="currentColor"/>
              <line x1="11" y1="5" x2="15" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="15" y1="5" x2="11" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="corner-btn" id="cornerFullBtn" aria-label="Plein écran">
            <svg class="ri" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="reel-controls-area">
        <div class="reel-thin">
          <div class="reel-thin-fill" id="reelSimpleFill"></div>
        </div>
        <div class="reel-pill">
          <div class="pill-btns">
            <button class="pill-btn" id="reelPlayBtn" aria-label="Lecture">
              <svg class="ri ri-play" viewBox="0 0 16 16"><path d="M3 2l10 6-10 6z" fill="currentColor"/></svg>
              <svg class="ri ri-pause" viewBox="0 0 16 16">
                <rect x="3" y="2" width="4" height="12" rx="1" fill="currentColor"/>
                <rect x="9" y="2" width="4" height="12" rx="1" fill="currentColor"/>
              </svg>
            </button>
            <button class="pill-btn" id="reelMuteBtn" aria-label="Son">
              <svg class="ri ri-unmuted" viewBox="0 0 16 16">
                <path d="M2 5.5v5h3l4 3v-11l-4 3z" fill="currentColor"/>
                <path d="M11 6a2.5 2.5 0 0 1 0 4M13.5 4.5a5 5 0 0 1 0 7" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
              </svg>
              <svg class="ri ri-muted" viewBox="0 0 16 16">
                <path d="M2 5.5v5h3l4 3v-11l-4 3z" fill="currentColor"/>
                <line x1="11" y1="5" x2="15" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="15" y1="5" x2="11" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <div class="pill-strip" id="reelProgressArea">
            <div class="strip-tip" id="reelTip">
              <img class="tip-img" id="reelTipImg" src="" alt="">
              <span class="tip-time" id="reelTipTime">0:00</span>
            </div>
            <div class="strip-bar" id="reelBar">
              <div class="strip-poster"  id="reelPoster"></div>
              <div class="strip-hover"   id="reelHoverFill"></div>
              <div class="strip-played"  id="reelPlayed"></div>
              <div class="strip-dot"     id="reelDot"></div>
            </div>
          </div>

          <span class="pill-time" id="reelTimeDisplay">0:00</span>
        </div>
      </div>
    </div>
  </section>

  <!-- INFOS PROJET -->
  <section id="proj-info">
    <div class="pi-header">
      <div>
        <span class="pi-num" id="piNum"></span>
        <h1 class="pi-title" id="piTitle"></h1>
      </div>
      <div class="pi-tags" id="piTags"></div>
    </div>
    <div class="pi-body" id="piBody">
      <p class="pi-desc" id="piDesc"></p>
      <div class="pi-details" id="piDetails"></div>
    </div>
  </section>

  <!-- FOOTER PROJET -->
  <footer id="proj-foot">
    <a href="work.html" class="pi-back">← Retour au work</a>
    <span class="pf-credit">SimonNAE® — Paris</span>
  </footer>

  </div><!-- #proj-page -->

  <!-- NEXT PROJECT SCROLL TRIGGER -->
  <div id="next-proj-trigger">
    <div class="npt-info">
      <span class="npt-hint">Projet suivant</span>
      <span class="npt-title" id="nptTitle"></span>
    </div>
    <div class="npt-bar"><div class="npt-fill" id="nptFill"></div></div>
  </div>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script src="transitions.js"></script>
  <script src="project.js"></script>
</body>
</html>
